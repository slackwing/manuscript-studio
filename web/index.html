<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manuscript Studio</title>

  <!-- Caveat — handwriting font for note-input textareas. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">

  <!-- Book-style CSS -->
  <link rel="stylesheet" href="css/book.css?v=82">

  <!-- Paged.js for book pagination - loaded but not auto-run -->
  <script>
    // Prevent Paged.js from auto-running on page load
    window.PagedConfig = {
      auto: false
    };
  </script>
  <script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"></script>
</head>
<body>
  <!-- Top bar (not paginated) -->
  <div id="controls" class="pagedjs_ignore">
    <div class="control-group control-group-left">
      <span id="brand">manuscript studio</span>
    </div>
    <div class="control-group control-group-right">
      <span id="info-icon" tabindex="0" aria-label="Manuscript info">
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
          <path fill="currentColor" d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13zM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm6.5-.25A.75.75 0 0 1 7.25 7h1a.75.75 0 0 1 .75.75v2.75h.25a.75.75 0 0 1 0 1.5h-2a.75.75 0 0 1 0-1.5h.25v-2h-.25a.75.75 0 0 1-.75-.75zM8 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
        </svg>
      </span>
      <span id="manuscript-picker" class="manuscript-picker"></span>
      <span id="push-button-container" class="push-button-container"></span>
      <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- Annotation margin container (floating in right grey margin) -->
  <div id="annotation-margin" class="pagedjs_ignore">
    <div class="annotation-margin-inner">
      <!-- Sentence preview (first 3 words) -->
      <div id="sentence-preview" class="sentence-preview"></div>

      <!-- Container for all sticky notes (rendered dynamically) -->
      <div id="sticky-notes-container">
        <!-- Multiple sticky notes will be rendered here -->
      </div>
    </div>
  </div>

  <!-- Container for entire app -->
  <div id="app-container">
    <!-- Manuscript content (will be paginated by Paged.js) -->
    <div id="manuscript-content">
    </div>
  </div>

  <!-- Auth check (must run first) -->
  <script src="js/auth.js"></script>
  <script>
    // Check authentication before loading the app
    (async function() {
      const session = await checkAuth();
      if (!session) return; // Will redirect to login

      // Store session info for the app to use
      window.currentSession = session;

      // Store CSRF token in sessionStorage if present
      if (session.csrf_token) {
        sessionStorage.setItem('csrf_token', session.csrf_token);
      }
    })();
  </script>

  <!-- External libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/smartquotes/2.3.2/smartquotes.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Paged.js configuration (must load after Paged.js, before renderer) -->
  <script src="js/pagedjs-config.js"></script>

  <!-- Segmenter (must load before renderer) -->
  <script src="js/segmenter.js"></script>

  <!-- Rainbow slice utility (must load before renderer) -->
  <script src="js/rainbow-slice.js"></script>

  <!-- Application scripts -->
  <script src="js/text-markers.js?v=1"></script>
  <script src="js/picker.js?v=1"></script>
  <script src="js/info-tooltip.js?v=1"></script>
  <script src="js/renderer.js?v=66"></script>
  <script src="js/annotations.js?v=51"></script>
  <script src="js/vendor/diff-match-patch.js"></script>
  <script src="js/history.js?v=7"></script>
  <script src="js/suggestions.js?v=5"></script>
  <script src="js/push.js?v=6"></script>
</body>
</html>

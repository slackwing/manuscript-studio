# Manuscript Studio Configuration
# Copy this file to ~/.config/manuscript-studio/config.yaml and edit

version: 1.0

# ============================================================
# Database Connection
# ============================================================
# For GCP Managed PostgreSQL, use the private IP address.
# The database itself must already exist — create it with:
#   CREATE DATABASE "<name>";
# Liquibase will create the schema automatically.
database:
  host: "localhost"
  port: 5432
  name: "manuscript_studio"
  user: "manuscript_user"
  password: "REPLACE_ME_OR_SERVER_WONT_START"

# ============================================================
# File Paths
# ============================================================
# The private directory must already exist before running install.sh.
paths:
  # Where server source and data are stored
  private_dir: "/var/www/manuscript-studio"

  # Root directory under which manuscript git checkouts live. Every
  # manuscript's clone path is validated to resolve inside this directory.
  # Defaults to /repos (the path the install script mounts into the container).
  repos_dir: "/repos"

# ============================================================
# Manuscript Definitions
# ============================================================
# You can define multiple manuscripts here.
manuscripts:
  - name: "example-book"  # Internal identifier (URL-safe)

    repository:
      # GitHub repository URL (HTTPS)
      url: "https://github.com/yourusername/your-repo"

      # Branch to track
      branch: "main"

      # Path to manuscript file within the repository
      path: "manuscript.md"

      # GitHub Personal Access Token with repo read access
      # Create at: https://github.com/settings/tokens
      auth_token: "REPLACE_ME_OR_SERVER_WONT_START"

    # Per-manuscript webhook secret (optional)
    # Overrides global webhook_secret for this manuscript
    # webhook_secret: "manuscript-specific-secret"

  # Example of second manuscript (uncomment to use)
  # - name: "another-book"
  #   repository:
  #     url: "https://github.com/yourusername/another-repo"
  #     branch: "main"
  #     path: "book.manuscript"
  #     auth_token: "REPLACE_ME_OR_SERVER_WONT_START"

# ============================================================
# Authentication Settings
# ============================================================
auth:
  # Admin user — seeded/updated on every install.sh run.
  # Automatically granted access to every manuscript defined below.
  admin_username: "admin"
  admin_password: "REPLACE_ME_OR_SERVER_WONT_START"

  # System token for admin API endpoints
  # Generate with: openssl rand -hex 32
  system_token: "REPLACE_ME_OR_SERVER_WONT_START"

  # Secret for signing session cookies
  # Generate with: openssl rand -hex 32
  session_secret: "REPLACE_ME_OR_SERVER_WONT_START"

  # GitHub webhook validation secret (required when env=production)
  # Must match the secret configured in GitHub webhook settings.
  # Generate with: openssl rand -hex 32
  webhook_secret: "REPLACE_ME_OR_SERVER_WONT_START"

# ============================================================
# Server Configuration
# ============================================================
server:
  port: 5001
  host: "0.0.0.0"
  env: "production"  # or "development"

  # URL prefix when hosted under a path (e.g. "/manuscripts" for example.com/manuscripts).
  # Leave empty or "/" when hosted at the root of a domain/subdomain.
  # Must match the Apache <Location> path.
  base_path: ""

# ============================================================
# Logging Configuration
# ============================================================
logging:
  directory: "~/.config/manuscript-studio/logs"
  level: "info"  # debug, info, warn, error
  max_age_days: 30
  max_size_mb: 100
  rotate: true

# ============================================================
# Migration Settings
# ============================================================
migrations:
  # Lock manuscript during migration to prevent concurrent edits
  lock_during_migration: true

  # Whether to backup before migration (relies on DB backups if false)
  backup_before_migration: false

  # Queue annotations created during migration
  queue_annotations: true

# ============================================================
# Rate Limits
# ============================================================
# Per-process token-bucket limits on /api/admin/* endpoints. Keyed by the
# Authorization header (per-token), or remote IP when no header is present.
# Set to 0 to disable.
rate_limits:
  admin_per_token_rpm: 10
  admin_per_token_burst: 5
